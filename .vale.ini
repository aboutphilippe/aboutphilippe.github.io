# Vale prose linting — https://vale.sh/docs/
# styles/ = synced packages (vale sync). Only styles/Personal/ is committed (see .gitignore).
StylesPath = styles
MinAlertLevel = suggestion
Packages = Readability, Google, write-good, https://github.com/ammil-industries/vale-signs-of-ai-writing/releases/latest/download/signs-of-ai-writing.zip, https://github.com/tbhb/vale-ai-tells/releases/latest/download/ai-tells.zip

[*.md]
BasedOnStyles = Google, write-good, Readability, Personal, signs-of-ai-writing, ai-tells
# DirectAddress/RhetoricalQuestion (section-based) still false-positive on some files; off for clean runs
Personal.DirectAddress = NO
Personal.RhetoricalQuestion = NO
# Disable rules that are noisy for technical/blog content
Google.Spacing = NO
Google.Quotes = NO
Google.WordList = NO
Google.Parens = NO
Google.FirstPerson = NO
Google.We = NO
Google.Acronyms = NO
Google.Latin = NO
Google.Colons = NO

write-good.E-Prime = warning
write-good.So = NO
Google.Units = warning

# Readability settings optimized for technical documentation
Readability.FleschReadingEase = NO
Readability.FleschKincaid = NO 
Readability.GunningFog = 12.5
Readability.ColemanLiau = NO 
Readability.AutomatedReadability = NO
Readability.SMOG = NO
Readability.LIX = NO

ai-tells.EmDashUsage = warning
ai-tells.FormalRegister = warning
ai-tells.OverusedVocabulary = warning
