name: Vale

on:
  pull_request:
    paths:
      - "**.md"
      - ".vale.ini"

  push:
    branches: [main]
    paths:
      - "**.md"
      - ".vale.ini"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vale
        run: |
          VALE_VERSION="v3.0.0"
          wget -q "https://github.com/errata-ai/vale/releases/download/${VALE_VERSION}/vale_${VALE_VERSION#v}_Linux_64-bit.tar.gz"
          sudo tar -C /usr/local/bin -xzf "vale_${VALE_VERSION#v}_Linux_64-bit.tar.gz" vale
          vale -v

      - name: Sync Vale packages
        run: vale sync

      - name: Run Vale
        uses: errata-ai/vale-action@v2.1.1
        with:
          files: index.md README.md _posts
          reporter: github-pr-check
          fail_on_error: true
