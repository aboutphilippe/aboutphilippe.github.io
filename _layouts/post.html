---
layout: default
---

<div class="post-with-toc">
  <div class="post-content">
    <article id="post-top">
      <h1>{{ page.title }}</h1>
      <p class="muted">{{ page.date | date: "%B %d, %Y" }}</p>
      <aside id="toc-sidebar" class="toc-sidebar" aria-label="Table of contents">
        <nav class="toc-nav" aria-label="On this page">
          <p class="toc-label" id="toc-label">On this page</p>
        </nav>
      </aside>
      {{ content }}
      <p class="back-to-top"><a href="#post-top">Back to top</a></p>
    </article>
    <p class="muted"><a href="{{ '/' | relative_url }}">← Back</a></p>
  </div>
</div>
{% if content contains 'language-mermaid' %}
<script>
  (function () {
    var blocks = document.querySelectorAll("pre code.language-mermaid");
    if (!blocks.length) return;
    blocks.forEach(function (block) {
      var pre = block.closest("pre");
      var div = document.createElement("div");
      div.className = "mermaid";
      div.setAttribute("data-mermaid-source", block.textContent);
      div.setAttribute("aria-hidden", "true");
      pre.parentNode.replaceChild(div, pre);
    });
    function getMermaidTheme() {
      var theme = document.documentElement.getAttribute("data-theme") ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      return theme === "dark" ? "dark" : "neutral";
    }
    function loadAndRunMermaid() {
      if (window.__mermaidLoaded) return;
      window.__mermaidLoaded = true;
      var s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js";
      s.crossOrigin = "anonymous";
      s.onload = function () {
        mermaid.initialize({ startOnLoad: false, theme: getMermaidTheme() });
        document.querySelectorAll(".mermaid").forEach(function (div) {
          div.textContent = div.getAttribute("data-mermaid-source");
        });
        mermaid.run({ querySelector: ".mermaid", suppressErrors: true });
        window.addEventListener("themechange", function () {
          mermaid.initialize({ startOnLoad: false, theme: getMermaidTheme() });
          document.querySelectorAll(".mermaid").forEach(function (div, i) {
            var src = div.getAttribute("data-mermaid-source");
            if (!src) return;
            var id = "mermaid-theme-" + i + "-" + Date.now();
            mermaid.render(id, src.trim()).then(function (result) {
              div.innerHTML = result.svg;
              if (result.bindFunctions) result.bindFunctions(div);
            }).catch(function () {});
          });
        });
      };
      document.body.appendChild(s);
    }
    var observer = new IntersectionObserver(
      function (entries) {
        for (var i = 0; i < entries.length; i++) {
          if (entries[i].isIntersecting) {
            var run = function () { loadAndRunMermaid(); };
            if (window.requestIdleCallback) requestIdleCallback(run, { timeout: 2500 });
            else setTimeout(run, 2500);
            return;
          }
        }
      },
      { rootMargin: "200px", threshold: 0 }
    );
    document.querySelectorAll(".mermaid").forEach(function (el) { observer.observe(el); });
  })();
</script>
{% endif %}
<script>
  (function () {
    function runToc() {
    var article = document.querySelector(".post-content article");
    var nav = document.querySelector(".toc-nav");
    if (!article || !nav) return;
    var ul = document.createElement("ul");
    var titleLi = document.createElement("li");
    var titleLink = document.createElement("a");
    titleLink.href = "#post-top";
    titleLink.textContent = document.querySelector("article h1").textContent;
    titleLi.appendChild(titleLink);
    ul.appendChild(titleLi);
    var headings = article.querySelectorAll("h2, h3");
    headings.forEach(function (h) {
      var id =
        h.id ||
        h.textContent
          .toLowerCase()
          .replace(/\s+/g, "-")
          .replace(/[^a-z0-9-]/g, "");
      if (!h.id) h.id = id;
      var link = document.createElement("a");
      link.href = "#" + id;
      while (h.firstChild) link.appendChild(h.firstChild);
      h.appendChild(link);
      var li = document.createElement("li");
      li.className = h.tagName === "H3" ? "toc-h3" : "";
      var a = document.createElement("a");
      a.href = "#" + id;
      a.textContent = h.textContent;
      li.appendChild(a);
      if (h.tagName === "H2") {
        ul.appendChild(li);
      } else {
        var topLevelLis = ul.querySelectorAll(":scope > li");
        var parentLi = topLevelLis.length ? topLevelLis[topLevelLis.length - 1] : null;
        if (!parentLi) ul.appendChild(li);
        else {
          var nested = parentLi.querySelector(":scope > ul");
          if (!nested) {
            nested = document.createElement("ul");
            parentLi.appendChild(nested);
          }
          nested.appendChild(li);
        }
      }
    });
    nav.appendChild(ul);
    var sidebar = document.getElementById("toc-sidebar");
    sidebar.classList.add("toc-has-items");
    var label = document.getElementById("toc-label");
    if (label) {
      label.setAttribute("role", "button");
      label.setAttribute("aria-expanded", "false");
      label.setAttribute("tabindex", "0");
      label.addEventListener("click", function () {
        var open = sidebar.classList.toggle("is-open");
        label.setAttribute("aria-expanded", open ? "true" : "false");
      });
      label.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          var open = sidebar.classList.toggle("is-open");
          label.setAttribute("aria-expanded", open ? "true" : "false");
        }
      });
    }
    var observed = [article];
    headings.forEach(function (h) {
      observed.push(h);
    });
    var observer = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          var id = entry.target.id || "post-top";
          nav.querySelectorAll("a").forEach(function (a) {
            a.classList.toggle(
              "is-active",
              a.getAttribute("href") === "#" + id,
            );
          });
        });
      },
      { rootMargin: "-80px 0px -60% 0px", threshold: 0 },
    );
    observed.forEach(function (el) {
      observer.observe(el);
    });
    }
    if (window.requestIdleCallback) requestIdleCallback(runToc, { timeout: 2000 });
    else setTimeout(runToc, 0);
  })();
</script>
